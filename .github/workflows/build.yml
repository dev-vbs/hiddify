name: Автоматическая сборка с самоподписью
on:
  workflow_call:
    inputs:
      upload-artifact:
        type: boolean
        default: true
        description: "Загружать артефакты сборки"
      tag-name:
        type: string
        default: "auto-build-${{ github.run_number }}"
        description: "Имя тега для релиза"
      channel:
        type: string
        default: "dev"
        description: "Канал распространения (dev, beta, stable)"

env:
  IS_GITHUB_ACTIONS: 1
  CHANNEL: "${{ inputs.channel }}"
  FLUTTER_VERSION: '3.38.5'
  NDK_VERSION: r28c
  UPLOAD_ARTIFACT: "${{ inputs.upload-artifact }}"
  TAG_NAME: "${{ inputs.tag-name }}"
  TARGET_NAME_gz: "Hiddify-Linux-x64-AppImage.tar"
  TARGET_NAME_AppImage: "Hiddify-Linux-x64-AppImage"
  TARGET_NAME_deb: "Hiddify-Debian-x64"
  TARGET_NAME_apk: "Hiddify-Android"
  TARGET_NAME_aab: "Hiddify-Android"
  TARGET_NAME_exe: "Hiddify-Windows-Setup-x64"
  TARGET_NAME_msix: "Hiddify-Windows-x64"
  TARGET_NAME_zip: "Hiddify-Windows-Portable-x64"
  TARGET_NAME_dmg: "Hiddify-MacOS"
  TARGET_NAME_pkg: "Hiddify-MacOS-Installer"
  TARGET_NAME_ipa: "Hiddify-iOS"

jobs:
  # Генерация самоподписанных сертификатов
  generate-certificates:
    runs-on: ubuntu-latest
    outputs:
      android_keystore: ${{ steps.generate-android.outputs.keystore }}
      android_store_pass: ${{ steps.generate-android.outputs.store_pass }}
      android_key_pass: ${{ steps.generate-android.outputs.key_pass }}
      android_key_alias: ${{ steps.generate-android.outputs.key_alias }}
      windows_cert: ${{ steps.generate-windows.outputs.cert }}
      windows_password: ${{ steps.generate-windows.outputs.password }}
      windows_sha1: ${{ steps.generate-windows.outputs.sha1 }}
      macos_cert: ${{ steps.generate-macos.outputs.cert }}
      macos_password: ${{ steps.generate-macos.outputs.password }}
    steps:
      - name: Генерация самоподписанного сертификата для Android
        id: generate-android
        run: |
          # Генерация случайных паролей
          STORE_PASS=$(openssl rand -base64 32 | tr -d '/+=' | head -c 32)
          KEY_PASS=$(openssl rand -base64 32 | tr -d '/+=' | head -c 32)
          KEY_ALIAS="hiddify_$(openssl rand -hex 8)"
          
          # Создание keystore
          keytool -genkey -v -keystore android.keystore.jks \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -alias "$KEY_ALIAS" \
            -dname "CN=Hiddify, OU=Development, O=Hiddify, L=Unknown, ST=Unknown, C=US" \
            -storepass "$STORE_PASS" \
            -keypass "$KEY_PASS" \
            -noprompt
          
          # Конвертация в base64
          KEYSTORE_BASE64=$(cat android.keystore.jks | base64 -w 0)
          
          echo "keystore=$KEYSTORE_BASE64" >> $GITHUB_OUTPUT
          echo "store_pass=$STORE_PASS" >> $GITHUB_OUTPUT
          echo "key_pass=$KEY_PASS" >> $GITHUB_OUTPUT
          echo "key_alias=$KEY_ALIAS" >> $GITHUB_OUTPUT
          
          echo "✅ Сгенерирован Android keystore"
          echo "📝 Алиас: $KEY_ALIAS"
          
      - name: Генерация самоподписанного сертификата для Windows
        id: generate-windows
        run: |
          # Генерация случайного пароля
          CERT_PASS=$(openssl rand -base64 32 | tr -d '/+=' | head -c 32)
          
          # Создание конфигурации для сертификата
          cat > cert.conf << EOF
          [req]
          distinguished_name = req_distinguished_name
          x509_extensions = v3_req
          prompt = no
          
          [req_distinguished_name]
          CN = Hiddify
          O = Hiddify
          C = US
          
          [v3_req]
          keyUsage = keyEncipherment, dataEncipherment
          extendedKeyUsage = serverAuth, clientAuth, codeSigning
          subjectAltName = @alt_names
          
          [alt_names]
          DNS.1 = localhost
          DNS.2 = *.hiddify.com
          EOF
          
          # Создание самоподписанного сертификата
          openssl req -x509 -newkey rsa:2048 \
            -keyout key.pem \
            -out cert.pem \
            -days 3650 \
            -config cert.conf \
            -passout pass:$CERT_PASS
          
          # Конвертация в PFX
          openssl pkcs12 -export \
            -out windows.pfx \
            -inkey key.pem \
            -in cert.pem \
            -passout pass:$CERT_PASS \
            -passin pass:$CERT_PASS
          
          # Получение SHA1 отпечатка
          SHA1=$(openssl pkcs12 -in windows.pfx -nodes -passin pass:$CERT_PASS 2>/dev/null | openssl x509 -noout -fingerprint -sha1 | cut -d= -f2 | tr -d ':')
          
          # Конвертация в base64
          CERT_BASE64=$(cat windows.pfx | base64 -w 0)
          
          echo "cert=$CERT_BASE64" >> $GITHUB_OUTPUT
          echo "password=$CERT_PASS" >> $GITHUB_OUTPUT
          echo "sha1=$SHA1" >> $GITHUB_OUTPUT
          
          echo "✅ Сгенерирован Windows сертификат"
          echo "🔐 SHA1: $SHA1"
          
      - name: Генерация самоподписанного сертификата для macOS
        id: generate-macos
        run: |
          # Генерация случайного пароля
          CERT_PASS=$(openssl rand -base64 32 | tr -d '/+=' | head -c 32)
          
          # Создание ключа и сертификата
          openssl req -x509 -newkey rsa:2048 \
            -keyout macos.key \
            -out macos.crt \
            -days 3650 \
            -nodes \
            -subj "/CN=Hiddify/O=Hiddify/C=US"
          
          # Конвертация в P12
          openssl pkcs12 -export \
            -out macos.p12 \
            -inkey macos.key \
            -in macos.crt \
            -passout pass:$CERT_PASS
          
          # Конвертация в base64
          CERT_BASE64=$(cat macos.p12 | base64 -w 0)
          
          echo "cert=$CERT_BASE64" >> $GITHUB_OUTPUT
          echo "password=$CERT_PASS" >> $GITHUB_OUTPUT
          
          echo "✅ Сгенерирован macOS сертификат"
          
      - name: Сохранение сертификатов как артефакты
        uses: actions/upload-artifact@v6
        with:
          name: certificates
          path: |
            android.keystore.jks
            windows.pfx
            macos.p12
            cert.conf
          retention-days: 1
          
      - name: Вывод информации о сертификатах
        run: |
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "🔐 Сгенерированы самоподписанные сертификаты"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "📱 Android:"
          echo "   Алиас: ${{ steps.generate-android.outputs.key_alias }}"
          echo "   Действителен: 10000 дней"
          echo ""
          echo "🪟 Windows:"
          echo "   SHA1: ${{ steps.generate-windows.outputs.sha1 }}"
          echo "   Действителен: 3650 дней"
          echo ""
          echo "🍎 macOS:"
          echo "   Действителен: 3650 дней"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "⚠️  ВНИМАНИЕ: Это самоподписанные сертификаты"
          echo "   Они подходят для разработки и тестирования"
          echo "   Для публикации в магазинах используйте официальные сертификаты"
          
  # Джоба тестирования
  test:
    needs: [generate-certificates]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      
      - uses: subosito/flutter-action@v2.21.0
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'
          cache: true
          
      - name: Подготовка
        run: make linux-amd64-prepare
        
      - name: Тестирование
        run: flutter test

  # Основная джоба сборки с автоматической подписью
  build:
    needs: [test, generate-certificates]
    permissions: write-all
    continue-on-error: false

    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: android-apk
            os: ubuntu-latest
            targets: apk
            description: "Сборка Android APK"

          - platform: android-aab
            os: ubuntu-latest
            targets: aab
            description: "Сборка Android AAB"

          - platform: windows
            os: windows-latest
            aarch: amd64
            targets: exe,msix,zip
            description: "Сборка для Windows"

          - platform: linux
            os: ubuntu-22.04
            aarch: amd64
            targets: deb,gz,AppImage
            description: "Сборка для Linux"

          - platform: macos
            os: macos-15
            aarch: universal
            targets: dmg,pkg
            description: "Сборка для macOS"
            
    runs-on: ${{ matrix.os }}
    steps:
      - name: Клонирование репозитория
        uses: actions/checkout@v6

      # Загрузка сгенерированных сертификатов
      - name: Загрузка сертификатов
        uses: actions/download-artifact@v7
        with:
          name: certificates
          path: ./certs

      # Настройка подписи для macOS
      - name: Настройка самоподписанного сертификата для macOS
        if: startsWith(matrix.os,'macos')
        run: |
          # Импорт сертификата
          echo "${{ needs.generate-certificates.outputs.macos_cert }}" | base64 --decode > macos.p12
          security create-keychain -p "" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "" build.keychain
          security import macos.p12 -k build.keychain -P "${{ needs.generate-certificates.outputs.macos_password }}" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple: -s -k "" build.keychain
          
          echo "✅ macOS сертификат импортирован"

      # Установка Flutter
      - name: Установка Flutter
        uses: subosito/flutter-action@v2.21.0
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'
          cache: true

      # Очистка диска для Android
      - name: Очистка дискового пространства для Android
        if: startsWith(matrix.platform,'android')
        run: |
          df -h
          sudo rm -rf /usr/share/dotnet || true
          sudo rm -rf /opt/ghc || true
          sudo rm -rf /opt/hostedtoolcache/CodeQL || true
          rm -rf ~/.gradle/caches || true
          sudo apt-get autoremove -y
          sudo apt-get clean 
          
      # Настройка Java для Android
      - name: Установка Java для Android
        if: startsWith(matrix.platform,'android')
        uses: actions/setup-java@v5
        with:
          distribution: 'zulu'
          java-version: 17
          
      # Настройка Android SDK
      - name: Установка Android SDK
        uses: android-actions/setup-android@v3
        if: startsWith(matrix.platform,'android')
        
      # Кэширование Gradle
      - name: Кэширование Gradle
        uses: actions/cache@v5
        if: startsWith(matrix.platform,'android')
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*') }}
          restore-keys: |
            gradle-${{ runner.os }}-
                  
      # Установка зависимостей
      - name: Установка зависимостей
        run: |
          make ${{ matrix.platform }}-install-deps || true
          echo "$HOME/.pub-cache/bin" >> $GITHUB_PATH

      # Настройка подписи Android с автоматически сгенерированным ключом
      - name: Настройка подписи Android (автоматическая)
        if: startsWith(matrix.platform,'android')
        run: |
          # Создание папки для ключей
          mkdir -p android
          
          # Декодирование keystore из сгенерированного
          echo "${{ needs.generate-certificates.outputs.android_keystore }}" | base64 --decode > android/key.jks
          
          # Создание файла свойств подписи
          echo "storeFile=$(pwd)/android/key.jks" > android/key.properties
          echo "storePassword=${{ needs.generate-certificates.outputs.android_store_pass }}" >> android/key.properties
          echo "keyPassword=${{ needs.generate-certificates.outputs.android_key_pass }}" >> android/key.properties
          echo "keyAlias=${{ needs.generate-certificates.outputs.android_key_alias }}" >> android/key.properties
          
          echo "✅ Android подпись настроена"
          echo "📝 Алиас ключа: ${{ needs.generate-certificates.outputs.android_key_alias }}"

      # Настройка подписи Windows с автоматически сгенерированным сертификатом
      - name: Настройка подписи Windows (автоматическая)
        if: startsWith(matrix.platform,'windows')
        shell: pwsh
        run: |
          # Создание папки для сертификатов
          New-Item -ItemType Directory -Path "windows" -Force | Out-Null
          
          # Декодирование сертификата
          $certBase64 = "${{ needs.generate-certificates.outputs.windows_cert }}"
          [IO.File]::WriteAllBytes("windows\sign.pfx", [Convert]::FromBase64String($certBase64))
          
          # Создание конфигурации подписи
          $configPath = "windows\packaging\msix\make_config.yaml"
          if (Test-Path $configPath) {
            (Get-Content $configPath) -replace '^certificate_password:.*$', "certificate_password: ${{ needs.generate-certificates.outputs.windows_password }}" | Set-Content $configPath
          }
          
          Write-Host "✅ Windows подпись настроена"
          Write-Host "🔐 SHA1: ${{ needs.generate-certificates.outputs.windows_sha1 }}"

      # Подготовка к сборке
      - name: Подготовка к сборке для ${{ matrix.platform }}
        run: |
          make ${{ matrix.platform }}-prepare || echo "⚠️ Подготовка завершена с предупреждениями"

      # Сборка приложения
      - name: Сборка для ${{ matrix.platform }}
        run: |
          make ${{ matrix.platform }}-release
          echo "✅ Сборка завершена"

      # Подпись Windows приложения
      - name: Подпись приложения для Windows
        if: startsWith(matrix.platform,'windows')
        shell: pwsh
        run: |
          $certPath = "windows\sign.pfx"
          $certPass = "${{ needs.generate-certificates.outputs.windows_password }}"
          
          # Поиск exe файлов для подписи
          Get-ChildItem -Path dist -Recurse -Filter "*.exe" | ForEach-Object {
            Write-Host "Подпись: $($_.FullName)"
            & "C:\Program Files (x86)\Windows Kits\10\bin\10.0.22621.0\x64\signtool.exe" sign /fd SHA256 /f $certPath /p $certPass /t http://timestamp.digicert.com $_.FullName
          }
          
          Write-Host "✅ Windows приложение подписано"

      # Копирование файлов для Windows
      - name: Копирование файлов для Windows
        if: matrix.platform == 'windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path "out" -Force | Out-Null
          $targets = "${{ matrix.targets }}".Split(',')
          foreach ($ext in $targets) {
            $ext = $ext.Trim()
            $key = "TARGET_NAME_$ext"
            $targetName = [Environment]::GetEnvironmentVariable($key)
            
            $files = Get-ChildItem -Path dist -Recurse -Filter "*.$ext"
            foreach ($file in $files) {
                $destination = Join-Path -Path "out" -ChildPath "$targetName.$ext"
                Move-Item -Path $file.FullName -Destination $destination -Force
            }
          }
          Write-Host "✅ Файлы скопированы"

      # Копирование файлов для Android APK
      - name: Копирование файлов для Android APK
        if: matrix.platform == 'android-apk'
        run: |
          mkdir -p out
          if [ -d "./build/app/outputs/flutter-apk" ]; then
            cp ./build/app/outputs/flutter-apk/*arm64-v8a*.apk out/${TARGET_NAME_apk}-arm64.apk 2>/dev/null || echo "⚠️ Нет arm64 apk"
            cp ./build/app/outputs/flutter-apk/*armeabi-v7a*.apk out/${TARGET_NAME_apk}-arm7.apk 2>/dev/null || echo "⚠️ Нет arm7 apk"
            cp ./build/app/outputs/flutter-apk/*x86_64*.apk out/${TARGET_NAME_apk}-x86_64.apk 2>/dev/null || echo "⚠️ Нет x64 apk"
            cp ./build/app/outputs/flutter-apk/app-release.apk out/${TARGET_NAME_apk}-universal.apk 2>/dev/null || echo "⚠️ Нет universal apk"
          fi
          echo "✅ APK файлы скопированы"

      # Копирование файлов для Android AAB
      - name: Копирование файлов для Android AAB
        if: matrix.platform == 'android-aab'
        run: |
          mkdir -p out
          if [ -f "./build/app/outputs/bundle/release/app-release.aab" ]; then
            cp ./build/app/outputs/bundle/release/app-release.aab out/${TARGET_NAME_aab}.aab
          fi
          echo "✅ AAB файл скопирован"

      # Копирование файлов для Unix систем
      - name: Копирование файлов для Unix систем
        if: startsWith(matrix.platform,'linux') || matrix.platform == 'macos'
        run: |
          mkdir -p out
          for EXT in $(echo ${{ matrix.targets }} | tr ',' '\n'); do
            KEY=TARGET_NAME_${EXT}
            FILENAME=${!KEY}
            find dist -name "*.$EXT" -exec cp {} out/${FILENAME}.$EXT \;
            [ "$EXT" != "gz" ] && chmod +x out/${FILENAME}.$EXT 2>/dev/null || true
          done
          echo "✅ Файлы скопированы"

      # Загрузка артефактов
      - name: Загрузка артефактов
        if: env.UPLOAD_ARTIFACT == 'true'
        uses: actions/upload-artifact@v6
        with:
          name: ${{matrix.platform}}
          path: ./out
          retention-days: 7

  # Создание релиза с автоматическими артефактами
  create-release:
    permissions: write-all
    if: ${{ inputs.upload-artifact }}
    needs: [build, generate-certificates]
    runs-on: ubuntu-latest
    steps:
      - name: Клонирование репозитория
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          
      - name: Загрузка всех артефактов
        uses: actions/download-artifact@v7
        with:
          merge-multiple: true
          pattern: "*"
          path: ./out/
          
      - name: Создание архива с сертификатами (опционально)
        run: |
          mkdir -p certificates_backup
          echo "# Сертификаты для сборки ${{ env.TAG_NAME }}" > certificates_backup/README.md
          echo "" >> certificates_backup/README.md
          echo "⚠️ **ВАЖНО**: Эти сертификаты сгенерированы автоматически и предназначены только для разработки." >> certificates_backup/README.md
          echo "" >> certificates_backup/README.md
          echo "## Информация о сертификатах" >> certificates_backup/README.md
          echo "- Android Keystore: Сгенерирован автоматически" >> certificates_backup/README.md
          echo "- Windows PFX: Сгенерирован автоматически" >> certificates_backup/README.md
          echo "- macOS P12: Сгенерирован автоматически" >> certificates_backup/README.md
          echo "" >> certificates_backup/README.md
          echo "Для использования в production, замените на официальные сертификаты." >> certificates_backup/README.md
          
      - name: Просмотр структуры файлов
        run: |
          echo "📦 Собранные артефакты:"
          ls -la ./out/
          echo ""
          echo "Количество файлов: $(ls -1 ./out/ | wc -l)"
          
      - name: Создание сообщения релиза
        run: |
          cat > release.md << EOF
          # Автоматическая сборка ${{ env.TAG_NAME }}
          
          ## 📦 Состав сборки
          
          Эта сборка создана автоматически с использованием самоподписанных сертификатов.
          
          ### Включенные платформы:
          $(ls -1 ./out/ | sed 's/^/ - /')
          
          ### 🔐 Информация о подписи:
          - **Android**: Самоподписанный keystore (алиас: ${{ needs.generate-certificates.outputs.android_key_alias }})
          - **Windows**: Самоподписанный сертификат (SHA1: ${{ needs.generate-certificates.outputs.windows_sha1 }})
          - **macOS**: Самоподписанный сертификат
          
          > ⚠️ **Внимание**: Это самоподписанные сертификаты, предназначенные только для разработки и тестирования.
          
          ## 📝 Изменения
          
          $(git log --oneline --pretty=format:"- %s" $(git describe --tags --abbrev=0 2>/dev/null || echo "HEAD~10")..HEAD 2>/dev/null || echo "Нет данных об изменениях")
          
          ## 🚀 Установка
          
          Скачайте соответствующий файл для вашей платформы:
          
          - **Windows**: Файлы .exe, .msix или .zip
          - **macOS**: Файлы .dmg или .pkg
          - **Linux**: Файлы .deb, .AppImage или .tar.gz
          - **Android**: APK файлы для разных архитектур
          
          ---
          *Сборка создана: $(date +'%Y-%m-%d %H:%M:%S')*
          *GitHub Actions Run: [${{ github.run_id }}](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})*
          EOF
          
      - name: Создание или обновление релиза
        uses: softprops/action-gh-release@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          files: ./out/*
          name: "Автоматическая сборка ${{ env.TAG_NAME }}"
          tag_name: ${{ env.TAG_NAME }}
          body_path: ./release.md
          prerelease: true
          draft: false
          
      - name: Вывод итоговой информации
        run: |
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "✅ СБОРКА УСПЕШНО ЗАВЕРШЕНА"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "📦 Релиз: ${{ env.TAG_NAME }}"
          echo "🔗 Ссылка: ${{ github.server_url }}/${{ github.repository }}/releases/tag/${{ env.TAG_NAME }}"
          echo "📊 Количество артефактов: $(ls -1 ./out/ | wc -l)"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "🔐 ИНФОРМАЦИЯ О СЕРТИФИКАТАХ:"
          echo "   Android алиас: ${{ needs.generate-certificates.outputs.android_key_alias }}"
          echo "   Windows SHA1: ${{ needs.generate-certificates.outputs.windows_sha1 }}"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "⚠️  ВНИМАНИЕ: Используются самоподписанные сертификаты!"
